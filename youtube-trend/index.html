<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube 트렌드 대시보드</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>YouTube 트렌드 대시보드</h1>
        <p>검색 키워드 기반 참여율(%) 분석</p>
      </header>

      <section class="panel">
        <form id="searchForm" class="search-form">
          <label for="apiKey">YouTube Data API Key</label>
          <input
            id="apiKey"
            name="apiKey"
            type="password"
            placeholder="API 키를 입력하세요"
            required
          />

          <label for="keyword">검색 키워드</label>
          <input
            id="keyword"
            name="keyword"
            type="text"
            placeholder="예: AI, K-pop, 축구 하이라이트"
            required
          />

          <label for="maxResults">검색 개수 (최대 50)</label>
          <input
            id="maxResults"
            name="maxResults"
            type="number"
            min="5"
            max="50"
            value="20"
            required
          />

          <button type="submit" id="searchBtn">검색 및 분석</button>
        </form>
        <p class="hint">
          참여율 공식: <strong>(좋아요 + 댓글) ÷ 조회수 × 100</strong>
        </p>
        <p id="statusMessage" class="status"></p>
      </section>

      <section class="panel">
        <h2>상위 10개 참여율 차트</h2>
        <canvas id="engagementChart" height="120"></canvas>
      </section>

      <section class="panel">
        <h2>영상 카드뷰</h2>
        <div id="results" class="card-grid"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
