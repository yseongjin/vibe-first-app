<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>내 위치 날씨</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 고정 640×400 뷰: 콘텐츠가 넘치면 내부 스크롤 -->
    <div class="page">
      <header class="header">
        <h1 class="title">내 위치 날씨</h1>
        <p class="subtitle">
          API Key 입력 후 버튼 → 현재 위치 날씨 조회
        </p>
      </header>

      <main class="main">
        <form class="form" id="weather-form" novalidate>
          <div class="form-row">
            <div class="field field--grow">
              <label class="label" for="api-key-input">OpenWeather API Key</label>
              <input
                class="input"
                id="api-key-input"
                name="apiKey"
                type="password"
                autocomplete="off"
                spellcheck="false"
                placeholder="API Key"
                aria-describedby="api-key-hint"
              />
            </div>
            <button class="btn" type="submit" id="fetch-btn" aria-busy="false">
              날씨 보기
            </button>
          </div>
          <p class="hint" id="api-key-hint">
            Key는 메모리에만 사용 · localStorage 미사용
          </p>
        </form>

        <p
          class="status"
          id="status-message"
          role="status"
          aria-live="polite"
        ></p>

        <section class="card" id="weather-card" aria-labelledby="card-heading">
          <h2 class="card-title" id="card-heading">날씨 정보</h2>
          <div class="card-body" id="card-body">
            <p class="placeholder" id="card-placeholder">
              API Key 입력 후 조회하면 여기에 날씨가 표시됩니다.
            </p>
            <div class="weather-result hidden" id="weather-result">
              <!-- 좌측: 아이콘 · 온도 · 지역 -->
              <div class="weather-col weather-col--primary">
                <div class="icon-wrap">
                  <img
                    class="weather-icon"
                    id="weather-icon"
                    src=""
                    alt=""
                    width="96"
                    height="96"
                    decoding="async"
                  />
                </div>
                <p class="temp" id="temperature" aria-label="현재 기온"></p>
                <p class="city" id="city-name"></p>
                <p class="desc" id="weather-desc"></p>
              </div>
              <!-- 우측: 체감 · 습도 · 풍속 -->
              <div class="weather-col weather-col--meta" aria-label="상세 정보">
                <ul class="meta-list">
                  <li class="meta-item">
                    <span class="meta-label">체감온도</span>
                    <span class="meta-value" id="feels-like"></span>
                  </li>
                  <li class="meta-item">
                    <span class="meta-label">습도</span>
                    <span class="meta-value" id="humidity"></span>
                  </li>
                  <li class="meta-item">
                    <span class="meta-label">풍속</span>
                    <span class="meta-value" id="wind-speed"></span>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <small>Weather data by OpenWeather</small>
      </footer>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
