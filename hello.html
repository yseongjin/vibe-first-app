<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Vibe Coding</title>
  <style>
    :root {
      --bg-1: #0f0c29;
      --bg-2: #302b63;
      --bg-3: #24243e;
      --text: #f4f4f8;
      --accent: #c084fc;
      --accent-soft: rgba(192, 132, 252, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      background-attachment: fixed;
    }

    main {
      text-align: center;
      padding: 2.5rem 2rem;
      max-width: 36rem;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    h1 span {
      background: linear-gradient(120deg, #e9d5ff, var(--accent), #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      margin: 0;
      font-size: 1.05rem;
      opacity: 0.85;
      line-height: 1.5;
    }

    .glow {
      margin-top: 2rem;
      height: 4px;
      width: min(12rem, 60%);
      margin-left: auto;
      margin-right: auto;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--accent-soft), var(--accent), var(--accent-soft), transparent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello <span>Vibe Coding</span></h1>
    <p>간단한 HTML/CSS 한 페이지로 만든 인사말입니다.</p>
    <div class="glow" aria-hidden="true"></div>
  </main>
</body>
</html>
