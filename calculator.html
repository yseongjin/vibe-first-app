<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Calculator</title>
  <style>
    :root {
      --body-bg: #f4f5f7;
      --calculator-bg: #ffffff;
      --text-color: #1f2937;
      --display-border: #d9d9d9;
      --display-bg: #fafafa;
      --button-bg: #e9ecf1;
      --button-hover-bg: #dde2ea;
      --operator-bg: #cfe0ff;
      --operator-hover-bg: #b8d0ff;
      --equals-bg: #6d9eff;
      --equals-hover-bg: #5a8ef6;
      --clear-bg: #ffd3d3;
      --clear-hover-bg: #ffc0c0;
      --toggle-bg: #e8ecf3;
      --toggle-hover-bg: #d9dfeb;
      --shadow-color: rgba(0, 0, 0, 0.12);
    }

    [data-theme="dark"] {
      --body-bg: #111827;
      --calculator-bg: #1f2937;
      --text-color: #f9fafb;
      --display-border: #374151;
      --display-bg: #111827;
      --button-bg: #374151;
      --button-hover-bg: #4b5563;
      --operator-bg: #334155;
      --operator-hover-bg: #475569;
      --equals-bg: #2563eb;
      --equals-hover-bg: #1d4ed8;
      --clear-bg: #7f1d1d;
      --clear-hover-bg: #991b1b;
      --toggle-bg: #374151;
      --toggle-hover-bg: #4b5563;
      --shadow-color: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: var(--body-bg);
      color: var(--text-color);
    }

    .calculator {
      width: 320px;
      padding: 16px;
      border-radius: 12px;
      background: var(--calculator-bg);
      box-shadow: 0 10px 25px var(--shadow-color);
    }

    .app-header {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .app-title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .theme-toggle {
      height: 36px;
      padding: 0 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      background: var(--toggle-bg);
      color: var(--text-color);
    }

    .theme-toggle:hover {
      background: var(--toggle-hover-bg);
    }

    .display {
      width: 100%;
      height: 56px;
      margin-bottom: 12px;
      padding: 0 12px;
      border: 1px solid var(--display-border);
      border-radius: 8px;
      font-size: 1.4rem;
      text-align: right;
      background: var(--display-bg);
      color: var(--text-color);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      height: 48px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      background: var(--button-bg);
      color: var(--text-color);
    }

    button:hover {
      background: var(--button-hover-bg);
    }

    .operator {
      background: var(--operator-bg);
    }

    .operator:hover {
      background: var(--operator-hover-bg);
    }

    .equals {
      background: var(--equals-bg);
      color: #fff;
      grid-column: span 2;
    }

    .equals:hover {
      background: var(--equals-hover-bg);
    }

    .clear {
      background: var(--clear-bg);
    }

    .clear:hover {
      background: var(--clear-hover-bg);
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="app-header">
      <h1 class="app-title">Simple Calculator</h1>
      <button id="themeToggle" class="theme-toggle" type="button">Dark</button>
    </div>
    <input id="display" class="display" type="text" readonly />
    <div class="buttons">
      <button class="clear" data-value="C">C</button>
      <button data-value=".">.</button>
      <button class="operator" data-value="/">/</button>
      <button class="operator" data-value="*">*</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="operator" data-value="-">-</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="operator" data-value="+">+</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button data-value="00">00</button>

      <button data-value="0">0</button>
      <button class="equals" data-value="=">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");
    const calcButtons = document.querySelectorAll(".buttons button");
    const themeToggle = document.getElementById("themeToggle");
    const calcHistory = [];
    let currentTheme = "light";

    function appendValue(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function calculate() {
      if (!display.value.trim()) return;

      try {
        const expression = display.value;
        const result = eval(expression);
        display.value = String(result);

        calcHistory.push(`${expression} = ${result}`);
        if (calcHistory.length > 5) {
          calcHistory.shift();
        }

        console.log("최근 5개 계산 기록:", calcHistory);
      } catch (error) {
        display.value = "Error";
      }
    }

    function setTheme(theme) {
      currentTheme = theme;
      document.documentElement.setAttribute("data-theme", theme);
      themeToggle.textContent = theme === "light" ? "Dark" : "Light";
    }

    themeToggle.addEventListener("click", () => {
      setTheme(currentTheme === "light" ? "dark" : "light");
    });

    calcButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const value = button.dataset.value;

        if (value === "C") {
          clearDisplay();
          return;
        }

        if (value === "=") {
          calculate();
          return;
        }

        appendValue(value);
      });
    });

    document.addEventListener("keydown", (event) => {
      const allowedKeys = "0123456789+-*/.";

      if (allowedKeys.includes(event.key)) {
        appendValue(event.key);
        return;
      }

      if (event.key === "Enter") {
        event.preventDefault();
        calculate();
        return;
      }

      if (event.key === "Backspace") {
        display.value = display.value.slice(0, -1);
        return;
      }

      if (event.key === "Escape") {
        clearDisplay();
      }
    });

    setTheme("light");
  </script>
</body>
</html>
